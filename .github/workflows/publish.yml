name: Publish to NuGet

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # Required for softprops/action-gh-release to create/update releases

jobs:
  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history needed for MinVer

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: dotnet restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack --configuration Release --no-build --output ./nupkg

      - name: Verify package version matches tag
        # Safety net: MinVer derives the package version from the git tag, but a misconfigured
        # MinVerVersionOverride, a stale cache, or a typo in the tag ref can silently push the
        # wrong version to NuGet — which cannot be deleted, only unlisted. Fail fast here.
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          NUPKG=$(find ./nupkg -name 'Boutquin.Numerics.*.nupkg' ! -name '*.snupkg' | head -1)
          if [ -z "$NUPKG" ]; then
            echo "::error::No Boutquin.Numerics .nupkg found — pack may have failed"
            exit 1
          fi
          VERSION=$(basename "$NUPKG" | sed 's/^Boutquin\.Numerics\.\(.*\)\.nupkg$/\1/')
          echo "Tag version:     $TAG"
          echo "Package version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match package version ($VERSION)"
            exit 1
          fi

      - name: Push to NuGet
        run: |
          for pkg in $(find ./nupkg -name "*.nupkg" ! -name "*.snupkg"); do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Push symbol packages
        continue-on-error: true
        run: |
          for pkg in $(find ./nupkg -name "*.snupkg"); do
            dotnet nuget push "$pkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Extract release notes for this tag
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          # Extract the [X.Y.Z] section from CHANGELOG.md (stop at the next ## heading).
          # Use index() rather than regex so the [ ] in the version header are treated
          # literally, not as character-class metacharacters.
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { flag=1; next }
            /^## \[/ && flag { exit }
            flag
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md has no entry for $TAG — falling back to commit subject." >&2
            git log -1 --format=%B "$TAG" > release-notes.md
          fi
          echo "Extracted notes for $TAG:"
          head -20 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          make_latest: true
          files: |
            ./nupkg/*.nupkg
            ./nupkg/*.snupkg
